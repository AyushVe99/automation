name: Node.js Mastery Content Automation

on:
  schedule:
    # Runs at 09:30 UTC (3:00 PM IST)
    - cron: '30 9 * * *'
  workflow_dispatch:

jobs:
  post-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Generate Node.js Mastery Dataset
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      run: npx tsx scripts/generate-node-dataset.ts

    - name: Post Node.js Mastery Content
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        IG_USER_ID: ${{ secrets.IG_USER_ID }}
        USE_GEMINI: 'true'
        DRY_RUN: 'false'
      run: npm run post:node-mastery

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add database.sqlite
        git commit -m "chore: update node-mastery db after post" || echo "No changes to commit"
        git push
