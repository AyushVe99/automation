name: JS Arch Content Automation

on:
  schedule:
    # Runs at 14:30 UTC (8:00 PM IST)
    - cron: '30 14 * * *'
  workflow_dispatch:

jobs:
  post-content:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Post JS Arch Content
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        IG_USER_ID: ${{ secrets.IG_USER_ID }}
        USE_GEMINI: 'true'
        DRY_RUN: 'false'
      run: npm run post:jsarch

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add database.sqlite
        git commit -m "chore: update js-arch db after post" || echo "No changes to commit"
        git push
