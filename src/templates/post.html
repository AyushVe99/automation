<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post Template</title>
  <!-- Prism.js Dark Theme (Okaidia) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f8fafc;
      width: 1080px;
      height: 1350px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
      position: relative;
    }

    /* Abstract shapes for branding */
    .shape-1 {
      position: absolute;
      top: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      background: rgba(56, 189, 248, 0.15);
      filter: blur(100px);
      border-radius: 50%;
    }
    .shape-2 {
      position: absolute;
      bottom: -150px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: rgba(168, 85, 247, 0.15);
      filter: blur(120px);
      border-radius: 50%;
    }

    .header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 60px;
      z-index: 10;
    }

    .series-badge {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 1px;
      backdrop-filter: blur(10px);
      text-transform: uppercase;
      color: #38bdf8;
    }

    .day-badge {
      font-size: 32px;
      font-weight: 800;
      color: #f8fafc;
    }

    .content {
      width: 100%;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 10;
    }

    .question-title {
      font-size: 54px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 40px;
      text-align: left;
      background: -webkit-linear-gradient(#fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .code-container {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 24px;
      padding: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      width: 100%;
    }

    .mac-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .mac-btn {
      width: 16px;
      height: 16px;
      border-radius: 50%;
    }
    .mac-close { background: #ff5f56; }
    .mac-min { background: #ffbd2e; }
    .mac-max { background: #27c93f; }

    pre[class*="language-"] {
      background: transparent !important;
      margin: 0 !important;
      padding: 0 !important;
      font-size: 36px !important;
      line-height: 1.6 !important;
      font-family: 'Fira Code', monospace !important;
      text-shadow: none !important;
      white-space: pre-wrap !important;
      word-break: break-word !important;
    }

    code[class*="language-"], pre[class*="language-"] {
      color: #f8fafc !important;
      text-shadow: none !important;
      white-space: pre-wrap !important;
      word-break: break-word !important;
    }

    .footer {
      width: 100%;
      text-align: center;
      font-size: 28px;
      font-weight: 600;
      color: #94a3b8;
      margin-top: 40px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cta {
      color: #a855f7;
    }
  </style>
</head>
<body>
  <div class="shape-1"></div>
  <div class="shape-2"></div>
  
  <div class="header">
    <div class="series-badge">100 Days of {{SERIES}}</div>
    <div class="day-badge">Day {{DAY}}</div>
  </div>

  <div class="content">
    <h1 class="question-title">{{TITLE}}</h1>
    
    <div class="code-container">
      <div class="mac-buttons">
        <div class="mac-btn mac-close"></div>
        <div class="mac-btn mac-min"></div>
        <div class="mac-btn mac-max"></div>
      </div>
      <pre><code class="language-javascript">{{CODE}}</code></pre>
    </div>
  </div>

  <div class="footer">
    <span class="difficulty">Difficulty: <span style="color: #cbd5e1;">{{DIFFICULTY}}</span></span>
    <span class="cta">Comment your answer below 👇</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
</body>
</html>
