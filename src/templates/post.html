<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post Template</title>
  <!-- Prism.js Dark Theme (Okaidia) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f8fafc;
      width: 1080px;
      height: 1350px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
      position: relative;
    }

    /* Abstract shapes for branding */
    .shape-1 {
      position: absolute;
      top: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      background: rgba(56, 189, 248, 0.15);
      filter: blur(100px);
      border-radius: 50%;
    }
    .shape-2 {
      position: absolute;
      bottom: -150px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: rgba(168, 85, 247, 0.15);
      filter: blur(120px);
      border-radius: 50%;
    }

    .header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 60px;
      z-index: 10;
    }

    .series-badge {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 1px;
      backdrop-filter: blur(10px);
      text-transform: uppercase;
      color: #38bdf8;
    }

    .day-badge {
      font-size: 32px;
      font-weight: 800;
      color: #f8fafc;
    }

    .content {
      width: 100%;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 10;
    }

    .question-title {
      font-size: 54px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 40px;
      text-align: left;
      background: -webkit-linear-gradient(#fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .code-container {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 24px;
      padding: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      width: 100%;
    }

    .mac-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .mac-btn {
      width: 16px;
      height: 16px;
      border-radius: 50%;
    }
    .mac-close { background: #ff5f56; }
    .mac-min { background: #ffbd2e; }
    .mac-max { background: #27c93f; }

    pre[class*="language-"] {
      background: transparent !important;
      margin: 0 !important;
      padding: 0 !important;
      font-size: 36px !important;
      line-height: 1.6 !important;
      font-family: 'Fira Code', monospace !important;
      text-shadow: none !important;
      white-space: pre-wrap !important;
      word-break: break-word !important;
    }

    code[class*="language-"], pre[class*="language-"] {
      color: #f8fafc !important;
      text-shadow: none !important;
      white-space: pre-wrap !important;
      word-break: break-word !important;
    }

    .footer {
      width: 100%;
      text-align: center;
      font-size: 28px;
      font-weight: 600;
      color: #94a3b8;
      margin-top: 40px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cta {
      color: #a855f7;
    }

    .slide {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      z-index: 10;
    }

    .slide.active {
      display: flex;
    }
  </style>
</head>
<body>
  <div class="shape-1"></div>
  <div class="shape-2"></div>
    {{SLIDES_HTML}}

    <div class="footer">
      <div class="watermark">@code.with.aakash</div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script>
    function getTotalSlides() {
      return document.querySelectorAll('.slide[data-slide="true"]').length;
    }

    function showSlide(index) {
      const slides = document.querySelectorAll('.slide[data-slide="true"]');
      slides.forEach(el => el.classList.remove('active'));
      const activeSlide = slides[index];
      activeSlide.classList.add('active');

      // Add simple slide numbers
      const slideTitle = activeSlide.querySelector('.slide-title');
      if (slideTitle && !slideTitle.innerText.includes('/')) {
        slideTitle.innerText = `${slideTitle.innerText} (${index + 1}/${slides.length})`;
      }

      // Handle custom JS-specific formatting per slide
      const lines = activeSlide.querySelectorAll('.line-number');
      lines.forEach((line, i) => {
        line.style.animationDelay = `${i * 0.1}s`;
      });
      
      const codeBlock = activeSlide.querySelector('pre');
      if (codeBlock) {
        let fontSize = 36;
        codeBlock.style.setProperty('font-size', fontSize + 'px', 'important');
        let lastHeight = document.body.scrollHeight;
        while (document.body.scrollHeight > 1350 && fontSize > 16) {
          fontSize--;
          codeBlock.style.setProperty('font-size', fontSize + 'px', 'important');
          if (document.body.scrollHeight === lastHeight) break;
          lastHeight = document.body.scrollHeight;
        }
      }

      // Auto-scale text content if it overflows
      const textElements = activeSlide.querySelectorAll('.answer-box div, .explanation-box div, .explanation-box p, .explanation-box li');
      if (textElements.length > 0 && document.body.scrollHeight > 1350) {
        let textFontSize = 28; 
        let lastHeight = document.body.scrollHeight;
        
        while (document.body.scrollHeight > 1350 && textFontSize > 12) {
          textFontSize--;
          textElements.forEach(el => {
             if(el.tagName !== 'H2' && el.tagName !== 'H3' && el.tagName !== 'H1') {
                el.style.setProperty('font-size', textFontSize + 'px', 'important');
                el.style.setProperty('line-height', '1.4', 'important');
             }
          });
          if (document.body.scrollHeight === lastHeight) break;
          lastHeight = document.body.scrollHeight;
        }
      }

      // Ensure layout changes force reflow
      void activeSlide.offsetWidth;
    }
  </script>
</body>
</html>
